spring:
  application:
    name: pay-pos-service
#  config:
#    import: optional:configserver:
  cloud:
    config:
      enabled: false
  datasource:
    url: jdbc:mysql://localhost:3306/pos_db
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: 1234
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true

server:
  port: 8081

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

eureka:
  client:
    server-url:
      defaultZone: http://localhost:8761/eureka/
