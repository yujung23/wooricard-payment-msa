spring:
  application:
    name: card-authorization-service
  
  datasource:
    url: jdbc:mysql://localhost:3306/card_authorization_db?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    defer-datasource-initialization: true
  
  sql:
    init:
      mode: always
      encoding: UTF-8
  
  security:
    user:
      name: card
      password: card123

server:
  port: 9090
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

logging:
  level:
    com.card.payment: DEBUG

# 은행 서비스 설정
bank:
  service:
    url: http://localhost:8084

# Swagger/OpenAPI 설정
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    display-request-duration: true
    doc-expansion: none
